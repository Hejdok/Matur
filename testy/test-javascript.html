<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="alah"> 
    <button class="open">Otvřeno</button> <br>
    <button class="smurf">Zešmouluj</button><br>
    <button class="nadpis">Zmeň</button>
    <h1 class="nad">Otevřeno</h1>


    <script>
        const smurf = document.querySelector(".smurf")
        const open = document.querySelector(".open")
        let inp = document.querySelector("#alah")
        let header = document.querySelector("#nadpis")

        smurf.addEventListener("click", smurfing)        
        header.addEventListener("click", change)
        open.addEventListener("click", coping)

        function smurfing(){
            smurf.style.backgroundColor = "blue"
            smurf.style.color = "white"
        }
        
        function change(){
            header.innerText = "Zavřeno"
        }

        function coping(){
            let op = "alahomora"
            if (inp.value == op) {
                open.innerText = "Otevřeno"
            }
        }

    </script>
</body>
</html>
