<!DOCTYPE html>
<html lang="charset">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #mini {
            color: wheat;
            background-color: blueviolet;
            font-family: monospace;
            text-align: center;
        }

        .form-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border:  2px solid red;
        }

        .form-wrapper > h2 {
            justify-self: start;
        }
    </style>
</head>
<body>
    <h1 style="color: red">Nadpis</h1>
    <h6 id="mini">Mini nadpis</h6>
    <span>Span- inline</span>
    <div>Div- podsebou</div>
    <a href="https://www.google.com">Google</a>
    <img src="" alt="">

<div class="form-wrapper">
    <h2>Form</h2>
    <form>
        <label for="Name">Name:</label>
        <input type="text" id="Name">
        <br>
        <label for="Class">Class:</label>
        <input type="text" id="Class">
        <br>
        <h4>Maturuješ?</h4>

        <label for="mat-check">Maturita???</label>
        <input type="checkbox" id="mat-check"> <br>

        <input type="radio" name="mat">
        <label for="no">No</label><br>
        <input type="radio" name="mat">
        <label for="yes">Yes</label><br>
        <button>Send</button>
    </form>
</div>
    <ul>
        <li>Zasloužím si šanci jít dál</li>
        <li>Mám znalosti</li>
        <li>Zvládl jsem roky školy</li>
    </ul>

</html>
