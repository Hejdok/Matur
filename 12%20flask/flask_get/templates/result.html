<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Age</th>

        {% for row in rows %}

                <td>{{ row[4] }}</td>
            </tr>
        
        {% endfor %}
    </table>



</body>
</html>
