<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>
<body>

    <h1>Contact</h1>

    <nav>
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="{{ url_for('manual') }}">Manual</a> |
        <a href="{{ url_for('contact') }}">Contact</a>
    </nav>

    <hr>

    <form method="POST">
        <label>
            Email:
            <br>
            <input type="email" name="email" required>
        </label>

        <br><br>

        <label>
            Message:
            <br>
            <textarea name="message" rows="5" cols="30" required></textarea>
        </label>

        <br><br>

        <button type="submit">Send</button>
    </form>

</body>
</html>
